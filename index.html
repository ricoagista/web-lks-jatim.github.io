<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERMINAL ACCESS - LKS JATIM</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;500&display=swap');

        :root {
            --term-green: #00ff41;
            --term-bg: #0a0a0a;
            --term-dim: #003b00;
        }

        body {
            background-color: var(--term-bg);
            color: var(--term-green);
            font-family: 'Fira Code', monospace;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* Efek Scanline CRT */
        body::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        .screen {
            width: 80%;
            max-width: 800px;
            padding: 40px;
            border: 2px solid var(--term-dim);
            position: relative;
            background: rgba(0, 20, 0, 0.2);
            box-shadow: 0 0 20px var(--term-dim);
        }

        .header {
            border-bottom: 2px solid var(--term-dim);
            margin-bottom: 20px;
            padding-bottom: 10px;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            color: var(--term-dim);
            margin-bottom: 10px;
        }

        h1 {
            font-size: 1.5rem;
            margin: 0;
            text-transform: uppercase;
        }

        .cursor {
            display: inline-block;
            width: 10px;
            height: 20px;
            background: var(--term-green);
            animation: blink 1s infinite;
            vertical-align: middle;
        }

        @keyframes blink {
            0%, 49% { opacity: 1; }
            50%, 100% { opacity: 0; }
        }

        .content {
            line-height: 1.6;
        }

        .input-area {
            margin-top: 30px;
            display: flex;
            align-items: center;
        }

        .prompt {
            margin-right: 10px;
        }

        input {
            background: transparent;
            border: none;
            color: var(--term-green);
            font-family: inherit;
            font-size: 1rem;
            outline: none;
            width: 100%;
        }

        .btn {
            margin-top: 20px;
            background: transparent;
            border: 1px solid var(--term-green);
            color: var(--term-green);
            padding: 10px 20px;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.3s;
        }

        .btn:hover {
            background: var(--term-green);
            color: var(--term-bg);
            box-shadow: 0 0 15px var(--term-green);
        }

        .glitch {
            animation: glitch 1s linear infinite;
        }

        @keyframes glitch {
            2%, 64% { transform: translate(2px, 0) skew(0deg); }
            4%, 60% { transform: translate(-2px, 0) skew(0deg); }
            62% { transform: translate(0, 0) skew(5deg); }
        }
    </style>
</head>
<body>

    <!-- 
         LKS{simple-web}
    -->

    <div class="screen">
        <div class="status-bar">
            <span>SECURE CONNECTION: ESTABLISHED</span>
            <span>NODE: LKS-JATIM-01</span>
        </div>
        
        <div class="header">
            <h1 class="glitch">Sistem Keamanan LKS</h1>
        </div>

        <div class="content">
            <p>> Inisialisasi protokol keamanan...</p>
            <p>> Memeriksa integritas data...</p>
            <p>> Peringatan: Data sensitif tidak ditemukan di antarmuka visual.</p>
            <p>> Admin menyembunyikan flag di balik struktur dasar sistem ini.</p>
        </div>

        <div class="input-area">
            <span class="prompt">guest@lks-jatim:~$</span>
            <input type="text" id="cmdInput" placeholder="Masukkan perintah..." autofocus autocomplete="off">
        </div>

        <button class="btn" onclick="executeCommand()">Jalankan Analisis</button>
    </div>

    <script>
        const input = document.getElementById('cmdInput');
        
        function executeCommand() {
            const val = input.value.toLowerCase();
            if (val === 'help') {
                alert('Gunakan alat pengembang browser (F12) untuk melihat struktur internal.');
            } else if (val !== '') {
                alert('Perintah "' + val + '" tidak dikenal. Coba gali lebih dalam di kode sumber.');
            } else {
                alert('Input kosong. Masukkan perintah analisis atau periksa DOM.');
            }
            input.value = '';
        }

        input.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                executeCommand();
            }
        });
    </script>
</body>
</html>
